<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ralphthon Seoul #2 - Team Showcase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0f1c;
    --surface: rgba(136, 146, 176, 0.05);
    --border: rgba(136, 146, 176, 0.12);
    --yellow: #FFD90F;
    --red: #E63946;
    --teal: #64ffda;
    --text: #ccd6f6;
    --muted: #8892b0;
    --card-hover: rgba(100, 255, 218, 0.06);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, 'Pretendard', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(100, 255, 218, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100, 255, 218, 0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    z-index: 0;
    pointer-events: none;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }

  /* ─── Header ─── */
  .header {
    text-align: center;
    margin-bottom: 3rem;
    padding-top: 2rem;
  }
  .header .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--teal);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }
  .header h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--red) 0%, #ff6b6b 40%, var(--yellow) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1rem;
  }
  .header .subtitle {
    font-size: 1.15rem;
    color: var(--muted);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .header .stats {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-top: 2rem;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--yellow);
  }
  .stat-label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 0.2rem;
  }

  /* ─── Search ─── */
  .search-bar {
    max-width: 500px;
    margin: 0 auto 3rem;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    height: 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0 1.2rem 0 3rem;
    font-size: 1rem;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    transition: border-color 0.3s, box-shadow 0.3s;
    outline: none;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 20px rgba(100, 255, 218, 0.1);
  }
  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1.1rem;
  }

  /* ─── Grid ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.2rem;
  }

  /* ─── Card ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red), var(--yellow));
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 2;
  }
  .card:hover {
    border-color: rgba(100, 255, 218, 0.25);
    background: var(--card-hover);
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }
  .card:hover::before { opacity: 1; }
  .card:hover .card-visual svg { opacity: 0.9; }

  .card-visual {
    width: 100%;
    height: 140px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .card-visual svg {
    width: 100%;
    height: 100%;
    opacity: 0.7;
    transition: opacity 0.3s;
  }

  .card-body {
    padding: 1.2rem 1.6rem 1.4rem;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
  }
  .card-name {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--yellow);
    line-height: 1.3;
  }
  .card-lobster {
    flex-shrink: 0;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .card-lobster span {
    font-size: 0.75rem;
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }

  .card-desc {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .card-members {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .card-members .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    opacity: 0.7;
  }
  .card-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
    border: 1px solid;
  }
  .tag-submitted {
    color: var(--teal);
    border-color: rgba(100, 255, 218, 0.3);
    background: rgba(100, 255, 218, 0.08);
  }
  .tag-ralphing {
    color: var(--red);
    border-color: rgba(230, 57, 70, 0.3);
    background: rgba(230, 57, 70, 0.08);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ─── Modal Overlay ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 15, 28, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000;
    justify-content: center;
    align-items: flex-start;
    padding: 4vh 1rem;
    overflow-y: auto;
  }
  .modal-overlay.open {
    display: flex;
  }

  .modal {
    width: 100%;
    max-width: 700px;
    background: #0d1424;
    border: 1px solid rgba(100, 255, 218, 0.2);
    border-radius: 20px;
    padding: 2.5rem 3rem;
    position: relative;
    animation: slideUp 0.35s ease-out;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 1.2rem;
    right: 1.5rem;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.8rem;
    cursor: pointer;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .modal-close:hover {
    color: var(--text);
    background: rgba(136, 146, 176, 0.15);
  }

  .modal-team-name {
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--yellow);
    margin-bottom: 0.5rem;
    padding-right: 2rem;
  }

  .modal-lobster-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    background: rgba(230, 57, 70, 0.12);
    border: 1px solid rgba(230, 57, 70, 0.3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--red);
    font-weight: 600;
    margin-bottom: 1.5rem;
  }

  .modal-section {
    margin-bottom: 1.8rem;
  }
  .modal-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--teal);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .modal-desc {
    font-size: 1rem;
    color: var(--text);
    line-height: 1.8;
    white-space: pre-line;
  }
  .modal-desc.empty {
    color: var(--muted);
    font-style: italic;
  }

  .modal-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.7rem 1.2rem;
    background: rgba(100, 255, 218, 0.08);
    border: 1px solid rgba(100, 255, 218, 0.25);
    border-radius: 10px;
    color: var(--teal);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.2s;
    word-break: break-all;
  }
  .modal-link:hover {
    background: rgba(100, 255, 218, 0.15);
    border-color: var(--teal);
    color: #fff;
  }
  .modal-link svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .modal-members-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .member-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.6rem 1rem;
    background: rgba(136, 146, 176, 0.06);
    border: 1px solid rgba(136, 146, 176, 0.08);
    border-radius: 10px;
  }
  .member-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .member-avatar.leader {
    background: rgba(255, 217, 15, 0.15);
    border: 1px solid rgba(255, 217, 15, 0.4);
    color: var(--yellow);
  }
  .member-avatar.member {
    background: rgba(136, 146, 176, 0.12);
    border: 1px solid rgba(136, 146, 176, 0.2);
    color: var(--muted);
  }
  .member-info {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
    min-width: 0;
  }
  .member-name {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
  }
  .member-email {
    font-size: 0.75rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .member-role {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .member-role.leader {
    color: var(--yellow);
    background: rgba(255, 217, 15, 0.1);
    border: 1px solid rgba(255, 217, 15, 0.25);
  }
  .member-role.member {
    color: var(--muted);
    background: rgba(136, 146, 176, 0.08);
    border: 1px solid rgba(136, 146, 176, 0.15);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  /* ─── No results ─── */
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .no-results .big-emoji {
    font-size: 4rem;
    margin-bottom: 1rem;
  }
  .no-results p {
    font-size: 1.1rem;
  }

  /* ─── Floating lobster ─── */
  .floating-lobster {
    position: fixed;
    font-size: 1.5rem;
    pointer-events: none;
    z-index: 5;
    opacity: 0.4;
    animation: drift var(--dur) linear var(--delay) infinite;
  }
  @keyframes drift {
    from { transform: translateY(0); }
    to { transform: translateY(-120vh); }
  }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .page { padding: 2rem 1rem 4rem; }
    .grid { grid-template-columns: 1fr; }
    .modal { padding: 2rem 1.5rem; }
    .header .stats { gap: 1.5rem; }
    .stat-num { font-size: 2rem; }
  }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb {
    background: rgba(136, 146, 176, 0.2);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(136, 146, 176, 0.35);
  }
</style>
</head>

// ─── Generative Visual ───
function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

const PALETTES = [
  ['#E63946','#FFD90F','#64ffda'],
  ['#ff6b6b','#ffd93d','#6bcb77'],
  ['#a855f7','#ec4899','#f97316'],
  ['#06b6d4','#8b5cf6','#f43f5e'],
  ['#10b981','#3b82f6','#f59e0b'],
  ['#e879f9','#67e8f9','#fbbf24'],
  ['#f472b6','#818cf8','#34d399'],
  ['#fb923c','#a78bfa','#2dd4bf'],
];

function generateVisual(teamName) {
  const hash = hashStr(teamName);
  const rand = seededRandom(hash);
  const palette = PALETTES[hash % PALETTES.length];
  const W = 400, H = 160;

  let shapes = '';
  const pattern = hash % 5;

  // Background gradient
  const bgAngle = Math.floor(rand() * 360);
  shapes += `<defs>
    <linearGradient id="bg${hash}" gradientTransform="rotate(${bgAngle})">
      <stop offset="0%" stop-color="${palette[0]}" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="${palette[2]}" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="${W}" height="${H}" fill="url(#bg${hash})"/>`;

  if (pattern === 0) {
    // Constellation: dots + connecting lines
    const pts = [];
    for (let i = 0; i < 18; i++) {
      pts.push({ x: rand() * W, y: rand() * H });
    }
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const d = Math.hypot(pts[i].x - pts[j].x, pts[i].y - pts[j].y);
        if (d < 100) {
          const op = (1 - d / 100) * 0.35;
          shapes += `<line x1="${pts[i].x}" y1="${pts[i].y}" x2="${pts[j].x}" y2="${pts[j].y}" stroke="${palette[Math.floor(rand()*3)]}" stroke-width="0.8" opacity="${op}"/>`;
        }
      }
    }
    pts.forEach(p => {
      const r = 1.5 + rand() * 3;
      shapes += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${palette[Math.floor(rand()*3)]}" opacity="${0.5 + rand()*0.5}"/>`;
    });

  } else if (pattern === 1) {
    // Concentric rings
    const cx = W * (0.3 + rand() * 0.4), cy = H * (0.3 + rand() * 0.4);
    for (let i = 8; i > 0; i--) {
      const r = 12 + i * 14 + rand() * 8;
      shapes += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${palette[i % 3]}" stroke-width="${0.6 + rand()}" opacity="${0.15 + rand()*0.25}" stroke-dasharray="${rand() > 0.5 ? `${3+rand()*8} ${2+rand()*6}` : 'none'}"/>`;
    }
    // Orbiting dots
    for (let i = 0; i < 6; i++) {
      const angle = rand() * Math.PI * 2;
      const dist = 30 + rand() * 70;
      shapes += `<circle cx="${cx + Math.cos(angle)*dist}" cy="${cy + Math.sin(angle)*dist}" r="${2 + rand()*3}" fill="${palette[i%3]}" opacity="${0.6+rand()*0.4}"/>`;
    }

  } else if (pattern === 2) {
    // Diagonal stripes + scattered shapes
    const gap = 16 + rand() * 10;
    const angle = -30 + rand() * 60;
    for (let i = -5; i < 30; i++) {
      const x = i * gap;
      const c = palette[i % 3 < 0 ? 0 : i % 3];
      shapes += `<line x1="${x}" y1="0" x2="${x + H * Math.tan(angle * Math.PI / 180)}" y2="${H}" stroke="${c}" stroke-width="${0.5 + rand()*1.2}" opacity="${0.12 + rand()*0.15}"/>`;
    }
    for (let i = 0; i < 8; i++) {
      const x = rand() * W, y = rand() * H, s = 6 + rand() * 16;
      if (rand() > 0.5) {
        shapes += `<rect x="${x}" y="${y}" width="${s}" height="${s}" rx="2" fill="${palette[Math.floor(rand()*3)]}" opacity="${0.25+rand()*0.35}" transform="rotate(${rand()*45},${x+s/2},${y+s/2})"/>`;
      } else {
        shapes += `<circle cx="${x}" cy="${y}" r="${s/2}" fill="${palette[Math.floor(rand()*3)]}" opacity="${0.2+rand()*0.3}"/>`;
      }
    }

  } else if (pattern === 3) {
    // Hexagonal grid
    const size = 22;
    const h = size * Math.sqrt(3);
    for (let row = -1; row < 9; row++) {
      for (let col = -1; col < 20; col++) {
        const x = col * size * 1.5;
        const y = row * h + (col % 2 ? h / 2 : 0);
        if (x > W + size || y > H + size) continue;
        const op = 0.08 + rand() * 0.2;
        const c = palette[Math.floor(rand() * 3)];
        if (rand() > 0.6) {
          shapes += `<polygon points="${hexPoints(x, y, size * 0.45)}" fill="${c}" opacity="${op}"/>`;
        } else {
          shapes += `<polygon points="${hexPoints(x, y, size * 0.45)}" fill="none" stroke="${c}" stroke-width="0.6" opacity="${op + 0.1}"/>`;
        }
      }
    }
    // Accent dots
    for (let i = 0; i < 5; i++) {
      shapes += `<circle cx="${rand()*W}" cy="${rand()*H}" r="${3+rand()*5}" fill="${palette[Math.floor(rand()*3)]}" opacity="${0.5+rand()*0.4}"/>`;
    }

  } else {
    // Waveform / data viz
    for (let wave = 0; wave < 3; wave++) {
      const amp = 15 + rand() * 25;
      const freq = 0.01 + rand() * 0.02;
      const yOff = 40 + wave * 30 + rand() * 20;
      let d = `M 0 ${yOff}`;
      for (let x = 0; x <= W; x += 4) {
        const y = yOff + Math.sin(x * freq + wave * 2) * amp + Math.sin(x * freq * 2.3) * amp * 0.3;
        d += ` L ${x} ${y}`;
      }
      shapes += `<path d="${d}" fill="none" stroke="${palette[wave % 3]}" stroke-width="${1 + rand()}" opacity="${0.25 + rand()*0.2}"/>`;
    }
    // Data points
    for (let i = 0; i < 10; i++) {
      shapes += `<circle cx="${rand()*W}" cy="${rand()*H}" r="${1.5+rand()*2.5}" fill="${palette[Math.floor(rand()*3)]}" opacity="${0.5+rand()*0.4}"/>`;
    }
  }

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">${shapes}</svg>`;
}

function hexPoints(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 6;
    pts.push(`${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`);
  }
  return pts.join(' ');
}

function renderCards(teams) {
  grid.innerHTML = '';
  if (teams.length === 0) {
    grid.innerHTML = `
      <div class="no-results">
        <div class="big-emoji">&#x1F99E;</div>
        <p>No teams found. Try a different search.</p>
      </div>`;
    return;
  }

  teams.forEach(team => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(team);

    const lobsterHtml = team.lobster > 0
      ? `<div class="card-lobster">${'&#x1F99E;'.repeat(Math.min(team.lobster, 3))}<span>${team.lobster > 3 ? '+' + (team.lobster - 3) : ''}</span></div>`
      : '';

    const tagHtml = team.github
      ? '<span class="card-tag tag-submitted">Submitted</span>'
      : '<span class="card-tag tag-ralphing">Ralphing...</span>';

    card.innerHTML = `
      <div class="card-visual">${generateVisual(team.name)}</div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-name">${esc(team.name)}</div>
          ${lobsterHtml}
        </div>
        <div class="card-desc">${esc(team.desc || 'No description yet')}</div>
        <div class="card-footer">
          <div class="card-members">
            <span class="dot"></span>
            ${team.members.length} member${team.members.length > 1 ? 's' : ''}
          </div>
          ${tagHtml}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(team) {
  const ghIcon = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>';

  const membersHtml = team.members.map(m => `
    <div class="member-row">
      <div class="member-avatar ${m.role}">${(m.name || '?')[0].toUpperCase()}</div>
      <div class="member-info">
        <div class="member-name">${esc(m.name || 'Anonymous')}</div>
      </div>
      <span class="member-role ${m.role}">${m.role}</span>
    </div>`).join('');

  const lobsterBadge = team.lobster > 0
    ? `<div class="modal-lobster-badge">${'&#x1F99E;'.repeat(Math.min(team.lobster, 5))} &times; ${team.lobster}</div>`
    : '';

  const githubLink = team.github
    ? `<a class="modal-link" href="${esc(team.github)}" target="_blank" rel="noopener noreferrer">
        ${ghIcon}
        ${esc(team.github.replace('https://github.com/', ''))}
      </a>`
    : '<span style="color:var(--muted);font-size:0.9rem;">Not submitted yet</span>';

  const videoLink = team.video
    ? `<a class="modal-link" href="${esc(team.video)}" target="_blank" rel="noopener noreferrer" style="border-color:rgba(230,57,70,0.25);background:rgba(230,57,70,0.08);color:var(--red);">
        &#x25B6;&#xFE0F; Demo Video
      </a>`
    : '';

  modalEl.innerHTML = `
    <div style="margin:-2.5rem -3rem 1.5rem;border-radius:20px 20px 0 0;overflow:hidden;height:160px;">
      ${generateVisual(team.name).replace('opacity="0.7"','')}
    </div>
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-team-name">${esc(team.name)}</div>
    ${lobsterBadge}

    <div class="modal-section">
      <div class="modal-label">Project Description</div>
      <div class="modal-desc ${team.desc ? '' : 'empty'}">${esc(team.desc || 'No description provided.')}</div>
    </div>

    <div class="divider"></div>

    <div class="modal-section">
      <div class="modal-label">GitHub Repository</div>
      <div style="margin-top:0.4rem;">${githubLink}</div>
      ${videoLink ? `<div style="margin-top:0.6rem;">${videoLink}</div>` : ''}
    </div>

    <div class="divider"></div>

    <div class="modal-section">
      <div class="modal-label">Team Members (${team.members.length})</div>
      <div class="modal-members-list">${membersHtml}</div>
    </div>`;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

overlay.addEventListener('click', e => {
  if (e.target === overlay) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Search
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) {
    renderCards(TEAMS);
    return;
  }
  const filtered = TEAMS.filter(t =>
    t.name.toLowerCase().includes(q) ||
    (t.desc || '').toLowerCase().includes(q) ||
    t.members.some(m => (m.name || '').toLowerCase().includes(q))
  );
  renderCards(filtered);
});

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Initial render
renderCards(TEAMS);

// ─── Auto-scroll (kiosk mode) ───
let autoScrollId = null;
const SCROLL_SPEED = 0.8; // px per frame

function startAutoScroll() {
  if (autoScrollId) return;
  autoScrollId = requestAnimationFrame(function tick() {
    window.scrollBy(0, SCROLL_SPEED);
    // Loop back to top when reaching bottom
    if ((window.innerHeight + window.scrollY) >= document.body.scrollHeight - 2) {
      window.scrollTo({ top: 0 });
    }
    autoScrollId = requestAnimationFrame(tick);
  });
}

function stopAutoScroll() {
  if (autoScrollId) {
    cancelAnimationFrame(autoScrollId);
    autoScrollId = null;
  }
}

// Pause on any user interaction, resume after 5s idle
let idleTimer = null;
function resetIdleTimer() {
  stopAutoScroll();
  clearTimeout(idleTimer);
  idleTimer = setTimeout(startAutoScroll, 5000);
}

['pointerdown', 'pointermove', 'wheel', 'keydown', 'touchstart'].forEach(evt => {
  window.addEventListener(evt, resetIdleTimer, { passive: true });
});

// Start auto-scroll after 8s initial idle
setTimeout(startAutoScroll, 8000);
</script>
</body>
</html>
